<div data-role="page" class="page type-interior pluginConfigurationPage withTabs"
     data-require="emby-button,emby-select"
     data-controller="__plugin/ratings_dashboard.js">
    <div data-role="content">
        <div class="content-primary">
            <h2>Ratings Dashboard</h2>

            <div id="ratings-stats-container" style="display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0;">
                <div class="stat-card" style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 20px; min-width: 150px; text-align: center;">
                    <div style="font-size: 32px; font-weight: bold; color: #00a4dc;" id="stat-total-ratings">-</div>
                    <div style="color: #999; margin-top: 5px;">Total Ratings</div>
                </div>
                <div class="stat-card" style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 20px; min-width: 150px; text-align: center;">
                    <div style="font-size: 32px; font-weight: bold; color: #00a4dc;" id="stat-total-users">-</div>
                    <div style="color: #999; margin-top: 5px;">Users with Ratings</div>
                </div>
                <div class="stat-card" style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 20px; min-width: 150px; text-align: center;">
                    <div style="font-size: 32px; font-weight: bold; color: #00a4dc;" id="stat-total-reviews">-</div>
                    <div style="color: #999; margin-top: 5px;">Total Reviews</div>
                </div>
                <div class="stat-card" style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 20px; min-width: 150px; text-align: center;">
                    <div style="font-size: 32px; font-weight: bold; color: #ffd700;" id="stat-avg-rating">-</div>
                    <div style="color: #999; margin-top: 5px;">Average Rating</div>
                </div>
            </div>

            <h3 style="margin-top: 30px;">Recent Activity</h3>
            <div id="recent-activity" style="background: rgba(255,255,255,0.03); border-radius: 8px; padding: 15px; max-height: 300px; overflow-y: auto;">
                <div style="color: #999; text-align: center;">Loading...</div>
            </div>

            <h3 style="margin-top: 30px;">Top Rated Items</h3>
            <div id="top-rated-items" style="display: flex; flex-wrap: wrap; gap: 15px;">
                <div style="color: #999;">Loading...</div>
            </div>
        </div>
    </div>
</div>
