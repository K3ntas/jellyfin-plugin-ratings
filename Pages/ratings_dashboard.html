<div data-role="page" class="page type-interior pluginConfigurationPage withTabs"
     data-require="emby-button,emby-select"
     data-controller="__plugin/ratings_dashboard.js">
    <div data-role="content">
        <div class="content-primary">
            <h2 class="dashboard-title">Ratings Dashboard</h2>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total-ratings">-</div>
                    <div class="stat-label">Total Ratings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-total-users">-</div>
                    <div class="stat-label">Active Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-total-reviews">-</div>
                    <div class="stat-label">Reviews Written</div>
                </div>
                <div class="stat-card stat-card-accent">
                    <div class="stat-value" id="stat-avg-rating">-</div>
                    <div class="stat-label">Average Rating</div>
                </div>
            </div>

            <!-- Main Content Grid -->
            <div class="dashboard-grid">
                <!-- Recent Activity -->
                <div class="dashboard-section activity-section">
                    <h3 class="section-title">Recent Activity</h3>
                    <div id="recent-activity" class="activity-list">
                        <div class="activity-empty">Loading...</div>
                    </div>
                </div>

                <!-- Top Rated -->
                <div class="dashboard-section top-rated-section">
                    <h3 class="section-title">Top Rated</h3>
                    <div id="top-rated-items" class="top-rated-grid">
                        <div class="activity-empty">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* Dashboard Layout */
        .dashboard-title {
            margin-bottom: 1.5em;
            font-weight: 300;
            font-size: 1.8em;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .stat-card-accent {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 215, 0, 0.02) 100%);
            border-color: rgba(255, 215, 0, 0.2);
        }

        .stat-value {
            font-size: 2.2em;
            font-weight: 600;
            color: #00a4dc;
            line-height: 1.2;
        }

        .stat-card-accent .stat-value {
            color: #ffd700;
        }

        .stat-label {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 1000px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Section Styling */
        .dashboard-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 20px;
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 500;
            margin: 0 0 16px 0;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
        }

        /* Activity List */
        .activity-list {
            max-height: 450px;
            overflow-y: auto;
        }

        .activity-empty {
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            padding: 32px 16px;
            font-size: 0.9em;
        }

        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .activity-content {
            flex: 1;
            min-width: 0;
        }

        .activity-main {
            font-size: 0.9em;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.85);
        }

        .activity-user {
            font-weight: 600;
            color: #00a4dc;
        }

        .activity-action strong {
            color: rgba(255, 255, 255, 0.95);
        }

        .activity-detail {
            margin-top: 4px;
        }

        .preview-text {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .request-status {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .status-completed {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .status-default {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
        }

        .activity-time {
            font-size: 0.75em;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
        }

        .activity-rating {
            font-size: 1.3em;
            font-weight: 700;
            color: #ffd700;
            flex-shrink: 0;
        }

        .activity-rating span {
            font-size: 0.6em;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Top Rated Grid */
        .top-rated-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        .top-rated-card {
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            transition: transform 0.2s;
        }

        .top-rated-card:hover {
            transform: scale(1.03);
        }

        .top-rated-rank {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(0, 0, 0, 0.75);
            color: #ffd700;
            font-size: 0.7em;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 1;
        }

        .top-rated-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        .top-rated-placeholder {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
        }

        .top-rated-info {
            padding: 8px 4px 0;
        }

        .top-rated-title {
            font-size: 0.8em;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(255, 255, 255, 0.9);
        }

        .top-rated-year {
            font-size: 0.7em;
            color: rgba(255, 255, 255, 0.4);
        }

        .top-rated-rating {
            font-size: 0.75em;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .top-rated-rating .star {
            color: #ffd700;
        }

        .top-rated-rating .score {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .top-rated-rating .count {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9em;
        }

        /* Scrollbar Styling */
        .activity-list::-webkit-scrollbar {
            width: 6px;
        }

        .activity-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 3px;
        }

        .activity-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .activity-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</div>
